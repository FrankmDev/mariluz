<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F2F5FA"/>
      <stop offset="100%" stop-color="#E8EDF5"/>
    </linearGradient>
    <radialGradient id="orb1" cx="20%" cy="20%" r="60%">
      <stop offset="0%" stop-color="rgba(0,122,255,0.12)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="orb2" cx="80%" cy="30%" r="50%">
      <stop offset="0%" stop-color="rgba(90,200,250,0.10)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#007AFF"/>
      <stop offset="55%" stop-color="#5AC8FA"/>
      <stop offset="100%" stop-color="#34AADC"/>
    </linearGradient>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="240" cy="126" rx="360" ry="270" fill="url(#orb1)"/>
  <ellipse cx="960" cy="189" rx="300" ry="225" fill="url(#orb2)"/>
  
  <!-- Glass Card -->
  <rect x="150" y="115" width="900" height="400" rx="40" fill="rgba(255,255,255,0.70)" stroke="rgba(255,255,255,0.72)" stroke-width="2"/>
  <rect x="150" y="115" width="900" height="220" rx="40" fill="url(#specular)" opacity="0.6"/>
  
  <defs>
    <linearGradient id="specular" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.88)"/>
      <stop offset="35%" stop-color="rgba(255,255,255,0.40)"/>
      <stop offset="65%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>
  
  <!-- Text -->
  <text x="600" y="260" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, SF Pro Display, Helvetica Neue, sans-serif" font-size="72" font-weight="800" fill="#1D1D1F" letter-spacing="-0.03em">Tu factura de luz.</text>
  <text x="600" y="340" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, SF Pro Display, Helvetica Neue, sans-serif" font-size="72" font-weight="800" fill="url(#textGrad)" letter-spacing="-0.03em">Reducida.</text>
  
  <text x="600" y="420" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, SF Pro Text, Helvetica Neue, sans-serif" font-size="28" font-weight="500" fill="#6E6E73">Asesoría energética gratuita en España</text>
  
  <!-- Badge -->
  <rect x="440" y="460" width="320" height="50" rx="25" fill="rgba(0,122,255,0.08)" stroke="rgba(0,122,255,0.15)" stroke-width="1"/>
  <text x="600" y="493" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, SF Pro Text, Helvetica Neue, sans-serif" font-size="18" font-weight="600" fill="#007AFF">Ahorra hasta 280€/año · Sin coste</text>
</svg>
